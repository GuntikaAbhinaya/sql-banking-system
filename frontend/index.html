<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Banking System – Demo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Mini Banking System (Demo)</h1>
    </header>

    <section class="card">
        <h2>Create Customer (Demo)</h2>
        <form id="custForm">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <input type="tel" placeholder="Phone" required>
            <button type="submit">Add Customer</button>
        </form>
    </section>

    <section class="card">
        <h2>Create Account (Demo)</h2>
        <form id="acctForm">
            <input type="text" placeholder="Customer Email" required>
            <select required>
                <option value="SAVINGS">Savings</option>
                <option value="CHECKING">Checking</option>
            </select>
            <button type="submit">Open Account</button>
        </form>
    </section>

    <section class="card">
        <h2>Deposit / Withdraw (Demo)</h2>
        <form id="txForm">
            <input type="text" placeholder="Account ID" required>
            <input type="number" step="0.01" placeholder="Amount" required>
            <select>
                <option value="DEPOSIT">Deposit</option>
                <option value="WITHDRAW">Withdraw</option>
            </select>
            <button type="submit">Submit</button>
        </form>
    </section>

    <section class="card">
        <h2>Account Balance (Static)</h2>
        <p><strong>Account #101:</strong> $2,500.00</p>
    </section>

    <section class="card">
        <h2>Transaction History (Static)</h2>
        <table>
            <thead><tr><th>ID</th><th>Type</th><th>Amount</th><th>Date</th></tr></thead>
            <tbody>
                <tr><td>1</td><td>Deposit</td><td>$500.00</td><td>2026‑04‑30</td></tr>
                <tr><td>2</td><td>Withdraw</td><td>$200.00</td><td>2026‑05‑01</td></tr>
                <tr><td>3</td><td>Deposit</td><td>$300.00</td><td>2026‑05‑02</td></tr>
            </tbody>
        </table>
    </section>

    <script src="app.js"></script>
</body>
</html>
